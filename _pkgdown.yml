url: https://dfo-pacific-science.github.io/metasalmon/

template:
  bootstrap: 5
  bslib:
    primary: "#0d7377"

home:
  title: "metasalmon: Salmon Data Package Utilities"
  description: |
    Create portable, ontology-aware Salmon Data Packages from your analysis-ready
    tables. Link your data to the DFO Salmon Ontology with semantic fields (IRIs,
    concept schemes) while preserving your original data structure.

  sidebar:
    structure: [license, community, citation, authors, dev]
    components:
      citation:
        title: Citation
        text: |
          If you use metasalmon in your research, please cite it.
      license:
        title: License
        text: |
          MIT + file LICENSE
      community:
        title: Community
        text: |
          - [Report a bug](https://github.com/dfo-pacific-science/metasalmon/issues)
          - [Request a feature](https://github.com/dfo-pacific-science/metasalmon/issues)
      dev:
        title: Development
        text: |
          This package is under active development.

reference:
  - title: "Start Here"
    desc: "One-shot package creation from raw tables"
    contents:
      - metasalmon
      - create_sdp
      - infer_salmon_datapackage_artifacts
      - read_salmon_datapackage
      - validate_salmon_datapackage

  - title: "Advanced Package Assembly"
    desc: "Manual writing when you already have the SDP metadata tables assembled"
    contents:
      - write_salmon_datapackage

  - title: "Dictionary Functions"
    desc: "Infer, validate, and apply semantic data dictionaries"
    contents:
      - infer_dictionary
      - validate_dictionary
      - apply_salmon_dictionary
      - apply_semantic_suggestions

  - title: "Semantic Helpers"
    desc: "Semantic suggestion, vocabulary search, and ranking benchmark capabilities"
    contents:
      - suggest_semantics
      - chat_decomposition
      - find_terms
      - sources_for_role
      - benchmark_term_ranking_fixtures
      - deduplicate_proposed_terms

  - title: "Ontology + Validation"
    desc: "Fetch the ontology and validate semantic coverage"
    contents:
      - fetch_salmon_ontology
      - validate_semantics
      - suggest_facet_schemes

  - title: "Term Request Workflow"
    desc: "Detect missing SMN terms, route shared vs profile requests, and draft GitHub issues"
    contents:
      - detect_semantic_term_gaps
      - render_ontology_term_request
      - submit_term_request_issues

  - title: "NuSEDS Helpers"
    desc: "Crosswalk legacy NuSEDS method labels to canonical method families"
    contents:
      - nuseds_enumeration_method_crosswalk
      - nuseds_estimate_method_crosswalk

  - title: "Darwin Core (DwC-DP)"
    desc: "Darwin Core Data Package mapping and export helpers"
    contents:
      - suggest_dwc_mappings
      - dwc_dp_build_descriptor

  - title: "Enterprise Data Hub (EDH)"
    desc: "HNAP-aware EDH XML export helpers for Enterprise Data Hub workflows"
    contents:
      - edh_build_hnap_xml
      - edh_build_iso19139_xml
      - write_edh_xml_from_sdp

  - title: "GitHub Access"
    desc: "Authenticate once and read CSVs from private GitHub repositories"
    contents:
      - ms_setup_github
      - github_raw_url
      - read_github_csv
      - read_github_csv_dir

  - title: "ICES Vocabulary"
    desc: "Access ICES reference codes and vocabulary"
    contents:
      - ices_vocab
      - ices_code_types
      - ices_codes
      - ices_find_code_types
      - ices_find_codes

  - title: "Maintenance"
    desc: "Version and update helpers"
    contents:
      - check_for_updates

articles:
  - title: "Getting Started"
    navbar: ~
    contents:
      - setup
      - metasalmon
      - llm-context-review

  - title: "Guides"
    navbar: ~
    desc: "Step-by-step guides for common workflows"
    contents:
      - post-review-package-publication
      - data-dictionary-publication
      - reusing-standards-salmon-data-terms
      - github-csv-access

  - title: "Reference"
    navbar: ~
    desc: "Glossary definitions and frequently asked questions"
    contents:
      - glossary
      - faq

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]

footer:
  structure:
    right: [built_with]
    left: [developed_by]
